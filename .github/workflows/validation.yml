name: Validation

on:
  push:
    branches:
      - main
      - 'codex/**'
      - 'node_refactor'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo check
        run: cargo check

      - name: Cargo clippy (-D warnings)
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Cargo build
        run: cargo build
