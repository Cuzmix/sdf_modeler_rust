[package]
name = "sdf_modeler"
version = "0.1.0"
edition = "2021"

# Fast debug builds: opt-level=2 gives ~90% of release perf with debug symbols + fast compile
[profile.dev]
opt-level = 2

# Keep full optimization for release
[profile.release]
debug = true  # include debug symbols for profiling (flamegraph, samply)

[lib]
# cdylib needed for WASM — re-add when wgpu 29+ unblocks web builds
crate-type = ["rlib"]

[features]
default = []
# Legacy feature: enables the old egui UI layer (off during Slint migration)
egui_ui = ["eframe", "egui_dock", "egui_node_graph2"]
# Slint UI: new declarative UI layer with wgpu 28 texture integration
slint_ui = ["dep:slint", "dep:slint-build"]

[dependencies]
wgpu = { version = "28", default-features = false, features = ["std", "wgsl", "vulkan"] }
winit = "0.30"
pollster = "0.4"
glam = { version = "0.29", features = ["serde"] }
bytemuck = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"

# Legacy egui dependencies (optional, behind egui_ui feature)
eframe = { version = "0.29", default-features = false, features = [
    "accesskit", "default_fonts", "wgpu", "wayland", "x11",
], optional = true }
egui_dock = { version = "0.14", optional = true }
egui_node_graph2 = { version = "0.7", optional = true }

# Slint UI (optional, behind slint_ui feature)
slint = { version = "~1.15", features = [
    "unstable-wgpu-28", "unstable-winit-030", "backend-winit",
], optional = true }

[build-dependencies]
slint-build = { version = "~1.15", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
env_logger = "0.11"
rayon = "1.11.0"
image = "0.25"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window", "Document", "HtmlCanvasElement",
    "HtmlAnchorElement", "Blob", "BlobPropertyBag",
    "Url", "Storage", "console",
] }
js-sys = "0.3"
console_error_panic_hook = "0.1"
