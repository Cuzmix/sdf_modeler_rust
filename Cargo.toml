[package]
name = "sdf_modeler"
version = "0.1.0"
edition = "2021"

# Fast debug builds: opt-level=2 gives ~90% of release perf with debug symbols + fast compile
[profile.dev]
opt-level = 2

# Keep full optimization for release
[profile.release]
debug = true  # include debug symbols for profiling (flamegraph, samply)

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
eframe = { version = "0.29", default-features = false, features = [
    "accesskit", "default_fonts", "wgpu", "wayland", "x11",
] }
egui_dock = "0.14"
egui_node_graph2 = "0.7"
glam = { version = "0.29", features = ["serde"] }
bytemuck = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"

[dev-dependencies]
naga = { version = "22.1", features = ["wgsl-in"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
env_logger = "0.11"
rayon = "1.11.0"
image = "0.25"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window", "Document", "HtmlCanvasElement",
    "HtmlAnchorElement", "Blob", "BlobPropertyBag",
    "Url", "Storage", "console",
] }
js-sys = "0.3"
console_error_panic_hook = "0.1"
